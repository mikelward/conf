name: test

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: make test
        # Runners check out fresh, so there is no cache to invalidate;
        # `make test` is equivalent to `make test-full` in this context.
        run: make test
