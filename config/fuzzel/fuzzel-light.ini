# fuzzel launcher configuration (LIGHT theme).
# ~/.config/fuzzel/fuzzel-light.ini
#
# Used by config/hypr/scripts/launch-fuzzel.sh via `fuzzel --config` between
# 07:00 and 19:00. Identical to fuzzel.ini except for the [colors] section.

[main]
terminal = kitty -e
layer = overlay
prompt = "  "
font = JetBrainsMono Nerd Font:size=12
icon-theme = Papirus
icons-enabled = yes
width = 40
lines = 12
horizontal-pad = 20
vertical-pad = 14
inner-pad = 8

[border]
width = 2
radius = 8

# Nord "Snow Storm" light palette (RRGGBBAA), darkened accents for contrast.
[colors]
background = eceff4f0
text = 2e3440ff
match = 5e81acff
selection = d8dee9ff
selection-text = 2e3440ff
selection-match = 5e81acff
border = 5e81acff
prompt = 4c566aff
