# fuzzel launcher configuration
# ~/.config/fuzzel/fuzzel.ini
#
# Bound to SUPER+Space in hyprland.conf. Nord-ish theme to match waybar.

[main]
terminal = kitty -e
layer = overlay
prompt = "  "
font = JetBrainsMono Nerd Font:size=12
icon-theme = Papirus
icons-enabled = yes
width = 40
lines = 12
horizontal-pad = 20
vertical-pad = 14
inner-pad = 8

[border]
width = 2
radius = 8

# Nord palette (RRGGBBAA).
[colors]
background = 2e3440f0
text = eceff4ff
match = 88c0d0ff
selection = 3b4252ff
selection-text = eceff4ff
selection-match = 88c0d0ff
border = 88c0d0ff
prompt = d8dee9ff
