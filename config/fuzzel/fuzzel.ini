# fuzzel launcher -- themed to match Waybar (dark, accent #ffb52a), with
# light rounding to match the other UI chrome. Opened with Super+Space.

[main]
font=Ubuntu Mono:size=12
terminal=terminal
layer=overlay
prompt=">  "
width=40
lines=12
horizontal-pad=16
vertical-pad=12
inner-pad=6
# Show application icons for a traditional launcher feel.
icons-enabled=yes

[colors]
# aarrggbb hex. Slightly translucent background, accent selection.
background=222222f2
text=dfdfdfff
prompt=dfdfdfff
match=ffb52aff
selection=ffb52aff
selection-text=222222ff
selection-match=222222ff
border=ffb52aff

[border]
# Thin border, subtle rounding (matches Waybar popovers / swaync).
width=1
radius=6

[dmenu]
# So `fuzzel --dmenu` pipelines behave predictably.
exit-on-empty=yes
