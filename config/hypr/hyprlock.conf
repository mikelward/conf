# hyprlock configuration
# ~/.config/hypr/hyprlock.conf
#
# A clean lock screen: dimmed wallpaper blur, a large clock, and a password
# input field. Matches the Nord-ish palette used by waybar/fuzzel/swaync.

background {
    monitor =
    # >>> PLACEHOLDER: same image as your wallpaper (or remove `path` for solid). <<<
    path = ~/.config/hypr/wallpaper.jpg
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
}

general {
    hide_cursor = true
    grace = 2
    ignore_empty_input = true
}

# Big clock.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(eceff4ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(d8dee9ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# Password input field.
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(88c0d0ff)
    inner_color = rgba(2e3440ff)
    font_color = rgba(eceff4ff)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    fail_text = <i>Wrong ($ATTEMPTS)</i>
    position = 0, -60
    halign = center
    valign = center
}
