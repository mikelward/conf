# Hyprland configuration
# ~/.config/hypr/hyprland.conf
#
# A dynamic-tiling Wayland desktop with a master/stack layout, modelled on
# the Krohnkite KWin script ("Tile" layout = master). See README.md in this
# directory for the package list, how to start the session, and a full list
# of the PLACEHOLDERS you must fill in (device names, monitor names, etc.).

################################################################################
# MONITORS
################################################################################
# Auto-place every output at its preferred mode, left-to-right. This catch-all
# needs no monitor names, so it works on every machine (laptop panel, docked,
# undocked, dual-head workstation) with zero config -- combined with lid.sh,
# which disables the internal panel on lid close so a clamshell setup falls back
# to the external automatically.
#
# For a SPECIFIC arrangement (fixed positions/scale/order), add per-output rules
# here, e.g.:  monitor = DP-1, 2560x1440@144, 0x0, 1
#              monitor = eDP-1, 1920x1080, 2560x0, 1
# Find names with `hyprctl monitors` / `wlr-randr`. (This is opt-in; the
# catch-all below already handles the common cases.)
monitor = , preferred, auto, auto

################################################################################
# PROGRAMS
################################################################################
# Change these if you prefer different defaults. $terminal is used by the
# keybinds below; kitty already ships a theme in this repo (config/kitty).
$terminal = kitty
$launcher = fuzzel
$lock = hyprlock

################################################################################
# AUTOSTART
################################################################################
# Wallpaper: swww gives a daemon you can swap wallpapers/transitions against.
# For a purely static wallpaper `swaybg -i <file>` is simpler (see README).
# >>> PLACEHOLDER: point this at a real image file. <<<
exec-once = swww-daemon
exec-once = sleep 1 && swww img ~/.config/hypr/wallpaper.jpg

# Idle/lock manager. (Display hotplug needs no daemon: the catch-all `monitor`
# rule above auto-places outputs, and lid.sh handles clamshell.)
exec-once = hypridle

# Auto-configure pointers (mice -> right button primary; touchpads left as-is)
# by classifying each device at login, so no device names are hardcoded.
exec-once = ~/.config/hypr/scripts/apply-input.sh

# Time-based light/dark theming. The daemon applies the current theme (light
# 07:00-19:00, dark otherwise) and LAUNCHES waybar + swaync with the matching
# style, then re-applies at each boundary -- so waybar/swaync are started here
# rather than with their own exec-once lines.
exec-once = ~/.config/hypr/scripts/theme-daemon.sh

# Tray applets: NetworkManager (network) and blueman (bluetooth) show up in the
# waybar tray. Volume/sound is handled by waybar's pulseaudio module (click for
# pavucontrol); network also has its own waybar module in addition to the tray
# applet. Comment out any you don't use.
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Polkit authentication agent (needed for GUI privilege prompts). Uncomment the
# one you have installed.
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
# exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

################################################################################
# ENVIRONMENT
################################################################################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Prefer Wayland backends where apps support it.
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1

################################################################################
# LAYOUT / LOOK
################################################################################
general {
    layout = master

    # No gaps, as requested.
    gaps_in = 0
    gaps_out = 0
    border_size = 2

    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(3b4252ff)

    # Drag-to-resize with the mouse without holding a modifier still needs the
    # modifier below; this only affects tiled resize by dragging borders.
    resize_on_border = true
    allow_tearing = false
}

decoration {
    # Slightly rounded corners + subtle blur, tasteful not gaudy.
    rounding = 6

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000044)
    }

    active_opacity = 1.0
    inactive_opacity = 1.0

    # Dim inactive windows, matching the KDE "dim inactive" effect the setup-kde
    # config enabled (Strength 15 -> 0.15 here). Subtle, so the focused window
    # stands out without the rest going murky.
    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.2
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 3, ease
    animation = windowsOut, 1, 3, ease, popin 80%
    animation = border, 1, 6, ease
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 3, ease
}

# Master layout = Krohnkite "Tile". New windows join the STACK (slave), not the
# master, matching Krohnkite's default. mfact is the master area ratio.
master {
    new_status = slave
    new_on_top = false
    mfact = 0.55
    orientation = left
    allow_small_split = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vfr = true
}

################################################################################
# INPUT
################################################################################
input {
    kb_layout = us

    # Focus follows the mouse; no click needed to focus a window.
    follow_mouse = 1
    # Don't change the tiled split when the mouse merely passes over windows.
    mouse_refocus = false

    sensitivity = 0
    accel_profile = flat

    # Global default handedness = right-handed (LEFT button primary). This is
    # what trackpads should use, so trackpads need no per-device block. Mice
    # get a per-device block below flipping them to left-handed (RIGHT button
    # primary).
    left_handed = false

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        # Trackpad scroll speed (applies to every touchpad).
        scroll_factor = 1.0
    }
}

# --- PER-DEVICE INPUT ---------------------------------------------------------
# The rule you want on every machine: TRACKPADS keep the left button primary
# (the global default above), and MICE use the RIGHT button primary
# (left_handed = true) with a slightly faster wheel. Hyprland matches `device {}`
# blocks by exact name and has no "all mice" selector, so rather than hardcoding
# device names per machine, apply-input.sh (autostarted below) enumerates the
# pointers at login, classifies each as touchpad or mouse, and applies the mouse
# settings automatically. No placeholders to fill in -- re-run it after
# hotplugging a mouse (or bind it to a key). Override the mouse scroll speed with
# HYPR_MOUSE_SCROLL_FACTOR.

# Touchpad gestures. Hyprland 0.51 removed the old `gestures { workspace_swipe }`
# block in favour of this 1:1 `gesture` syntax: a 3-finger horizontal swipe
# cycles workspaces. (On Hyprland < 0.51 use `gestures { workspace_swipe = true }`
# instead.)
gesture = 3, horizontal, workspace

################################################################################
# KEYBINDS
################################################################################
$mainMod = SUPER

# --- Applications / session ---
# App-launch shortcuts mirror the KDE/Krohnkite setup (setup-kde): the
# browser1/browser2/terminal/terminal_on_workstation/music helpers live in the
# scripts repo and are on $PATH.
bind = $mainMod, T, exec, $terminal              # terminal (Krohnkite Meta+T)
bind = $mainMod, W, exec, terminal_on_workstation # (Krohnkite Meta+W)
bind = $mainMod, G, exec, browser1               # (Krohnkite Meta+G)
bind = $mainMod, H, exec, browser2               # (Krohnkite Meta+H)
bind = $mainMod, Y, exec, music                  # (Krohnkite Meta+Y)
bind = $mainMod, E, exec, $terminal -e yazi      # file manager (yazi)
bind = $mainMod, Space, exec, ~/.config/hypr/scripts/launch-fuzzel.sh  # fuzzy launcher (theme-aware)
bind = $mainMod, BackSpace, killactive,          # close window (Krohnkite Meta+Backspace)
bind = $mainMod SHIFT, L, exec, $lock            # lock the screen now
bind = $mainMod SHIFT, E, exit,                  # exit Hyprland (log out)

# --- Krohnkite-equivalent master/stack controls ---
# Change master ratio (mfact). Keys match Krohnkite's grow/shrink width:
#   Meta+\  grows the master area, Meta+/ shrinks it.
binde = $mainMod, backslash, layoutmsg, mfact +0.025
binde = $mainMod, slash,     layoutmsg, mfact -0.025

# Swap the focused window with the master window (Krohnkite "Set master").
bind = $mainMod, Return, layoutmsg, swapwithmaster master

# Cycle layouts (Krohnkite Previous/Next layout). Cycles the tiling layouts
# tile -> threecolumn -> columns via the helper; monocle has its own key below.
bind = $mainMod, period, exec, ~/.config/hypr/scripts/layout-cycle.sh next
bind = $mainMod, comma,  exec, ~/.config/hypr/scripts/layout-cycle.sh prev

# Monocle: fullscreen state 1 keeps gaps and the bar visible (Krohnkite Meta+`).
bind = $mainMod, grave, fullscreen, 1

# Add / remove windows from the master area.
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, D, layoutmsg, removemaster

# Cycle the master orientation (left/top/right/bottom/center) = Krohnkite rotate.
bind = $mainMod, O, layoutmsg, orientationnext
bind = $mainMod SHIFT, O, layoutmsg, orientationprev

# Move focus through the stack.
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
# Move the focused window within the stack.
bind = $mainMod SHIFT, J, layoutmsg, swapnext
bind = $mainMod SHIFT, K, layoutmsg, swapprev

# Directional focus / move (arrow keys, in addition to the vim stack keys).
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Layout / window state ---
# Quick toggle between master and dwindle layouts.
bind = $mainMod SHIFT, backslash, exec, ~/.config/hypr/scripts/toggle-layout.sh
# True (state 0) fullscreen, covering the bar.
bind = $mainMod SHIFT, F, fullscreen, 0
# Toggle floating for the focused window.
bind = $mainMod, F, togglefloating,
# Pseudo-tile (useful with dwindle).
bind = $mainMod, P, pseudo,

# --- Resize submap (modal resize mode) ---
# Enter with SUPER+R, then use h/j/k/l or arrows to resize, Escape/Return exits.
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
binde = , left,  resizeactive, -40 0
binde = , right, resizeactive, 40 0
binde = , up,    resizeactive, 0 -40
binde = , down,  resizeactive, 0 40
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# --- Workspaces (virtual desktops 1-10) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move the focused window to a workspace (stays on current workspace).
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# --- Mouse: drag to move / resize ---
# SUPER + left mouse drags to move, SUPER + right mouse drags to resize.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media / brightness keys (laptop friendly) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Laptop lid ---
# On close: disable the internal panel; the helper suspends ONLY when no
# external display is connected (so a docked laptop with the lid shut keeps
# running on the external screen). On open: re-enable the internal panel.
# For this to be the sole lid handler, setup-hypr installs a logind drop-in
# setting HandleLidSwitch=ignore (see the scripts repo / README).
bindl = , switch:on:Lid Switch,  exec, ~/.config/hypr/scripts/lid.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh open

################################################################################
# WINDOW RULES
################################################################################
# Float common transient dialogs so they don't disrupt the tiling.
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save File)$
