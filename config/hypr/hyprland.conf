# Hyprland configuration (LEGACY hyprlang, Hyprland <= 0.54)
# ~/.config/hypr/hyprland.conf
#
# NOTE: since Hyprland 0.55 hyprlang is deprecated in favour of Lua, and
# hyprland.lua (in this directory) takes precedence over this file. This
# file is kept, frozen, for machines still on <= 0.54, which ignore
# hyprland.lua. Make changes in hyprland.lua first and mirror them here
# only while a <= 0.54 machine still needs them.
#
# A dynamic-tiling Wayland desktop with a master/stack layout, modelled on
# the Krohnkite KWin script ("Tile" layout = master). See README.md in this
# directory for the package list, how to start the session, and a full list
# of the PLACEHOLDERS you must fill in (device names, monitor names, etc.).

################################################################################
# MONITORS
################################################################################
# Auto-place every output at its preferred mode, left-to-right. This catch-all
# needs no monitor names, so it works on every machine (laptop panel, docked,
# undocked, dual-head workstation) with zero config -- combined with lid.sh,
# which disables the internal panel on lid close so a clamshell setup falls back
# to the external automatically.
#
# For a SPECIFIC arrangement (fixed positions/scale/order), add per-output rules
# here, e.g.:  monitor = DP-1, 2560x1440@144, 0x0, 1
#              monitor = eDP-1, 1920x1080, 2560x0, 1
# Find names with `hyprctl monitors` / `wlr-randr`. (This is opt-in; the
# catch-all below already handles the common cases.)
monitor = , preferred, auto, auto

################################################################################
# PROGRAMS
################################################################################
# Change these if you prefer different defaults. $terminal is used by the
# keybinds below; kitty already ships a theme in this repo (config/kitty).
$terminal = kitty
$launcher = fuzzel
$lock = hyprlock

################################################################################
# AUTOSTART
################################################################################
# Wallpaper: swww gives a daemon you can swap wallpapers/transitions against.
# For a purely static wallpaper `swaybg -i <file>` is simpler (see README).
# >>> PLACEHOLDER: point this at a real image file. <<<
exec-once = swww-daemon
exec-once = sleep 1 && swww img ~/.config/hypr/wallpaper.jpg

# Idle/lock manager. (Display hotplug needs no daemon: the catch-all `monitor`
# rule above auto-places outputs, and lid.sh handles clamshell.)
exec-once = hypridle

# Auto-configure pointers (mice -> right button primary; touchpads left as-is)
# by classifying each device at login, so no device names are hardcoded.
exec-once = ~/.config/hypr/scripts/apply-input.sh

# Time-based light/dark theming. The daemon applies the current theme (light
# 07:00-19:00, dark otherwise) and LAUNCHES waybar + swaync with the matching
# style, then re-applies at each boundary -- so waybar/swaync are started here
# rather than with their own exec-once lines.
exec-once = ~/.config/hypr/scripts/theme-daemon.sh

# Tray applets: NetworkManager (network) and blueman (bluetooth) show up in the
# waybar tray. Volume/sound is handled by waybar's pulseaudio module (click for
# pavucontrol); network also has its own waybar module in addition to the tray
# applet. Comment out any you don't use.
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Polkit authentication agent (needed for GUI privilege prompts). Uncomment the
# one you have installed.
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
# exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

################################################################################
# ENVIRONMENT
################################################################################
# These apply to a plain `exec Hyprland` session. If you launch via uwsm, the
# same vars are also set in config/uwsm/{env,env-hyprland} (shell `export`
# form) so systemd user services see them -- keep the two in sync.
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Prefer Wayland backends where apps support it.
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
# Match your xsessionrc: disable GTK overlay (disappearing) scrollbars.
env = GTK_OVERLAY_SCROLLING,0

################################################################################
# LAYOUT / LOOK
################################################################################
general {
    layout = master

    # No gaps, as requested.
    gaps_in = 0
    gaps_out = 0
    border_size = 2

    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(3b4252ff)

    # Drag-to-resize with the mouse without holding a modifier still needs the
    # modifier below; this only affects tiled resize by dragging borders.
    resize_on_border = true
    allow_tearing = false
}

decoration {
    # Slightly rounded corners + subtle blur, tasteful not gaudy.
    rounding = 6

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000044)
    }

    active_opacity = 1.0
    inactive_opacity = 1.0

    # Dim inactive windows, matching the KDE "dim inactive" effect the setup-kde
    # config enabled (Strength 15 -> 0.15 here). Subtle, so the focused window
    # stands out without the rest going murky.
    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.2
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 3, ease
    animation = windowsOut, 1, 3, ease, popin 80%
    animation = border, 1, 6, ease
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 3, ease
}

# Master layout = Krohnkite "Tile". New windows join the STACK (slave), not the
# master, matching Krohnkite's default. mfact is the master area ratio.
master {
    new_status = slave
    new_on_top = false
    mfact = 0.55
    orientation = left
    allow_small_split = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vfr = true
}

################################################################################
# INPUT
################################################################################
input {
    kb_layout = us
    kb_variant = dvorak
    # Caps Lock is the Compose key, matching `setup`'s configure_keyboard
    # (XKBOPTIONS="compose:caps"). (Your espanso config also uses
    # lv3:menu_switch; add it here as compose:caps,lv3:menu_switch if you want
    # the Menu key as AltGr too.)
    kb_options = compose:caps

    # Focus follows the mouse; no click needed to focus a window.
    follow_mouse = 1
    # Don't change the tiled split when the mouse merely passes over windows.
    mouse_refocus = false

    sensitivity = 0
    accel_profile = flat

    # Global default handedness = right-handed (LEFT button primary). This is
    # what trackpads should use, so trackpads need no per-device block. Mice
    # get a per-device block below flipping them to left-handed (RIGHT button
    # primary).
    left_handed = false

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        # Trackpad scroll speed (applies to every touchpad).
        scroll_factor = 1.0
    }
}

# --- PER-DEVICE INPUT ---------------------------------------------------------
# The rule you want on every machine: TRACKPADS keep the left button primary
# (the global default above), and MICE use the RIGHT button primary
# (left_handed = true) with a slightly faster wheel. Hyprland matches `device {}`
# blocks by exact name and has no "all mice" selector, so rather than hardcoding
# device names per machine, apply-input.sh (autostarted below) enumerates the
# pointers at login, classifies each as touchpad or mouse, and applies the mouse
# settings automatically. No placeholders to fill in -- re-run it after
# hotplugging a mouse (or bind it to a key). Override the mouse scroll speed with
# HYPR_MOUSE_SCROLL_FACTOR.

# Touchpad gestures. Hyprland 0.51 removed the old `gestures { workspace_swipe }`
# block in favour of this 1:1 `gesture` syntax: a 3-finger horizontal swipe
# cycles workspaces. (On Hyprland < 0.51 use `gestures { workspace_swipe = true }`
# instead.)
gesture = 3, horizontal, workspace

################################################################################
# KEYBINDS
################################################################################
$mainMod = SUPER

# --- Applications / session ---
# SUPER+<letter> launchers mirror your xbindkeysrc (Mod4). The helper scripts
# (browser1, home, irc, google-calendar, notepad, ...) live in the scripts repo
# on $PATH. Two intentional differences from xbindkeysrc: E is the file manager
# (not editor), and lock uses hyprlock directly (Wayland-native).
bind = $mainMod, T, exec, $terminal                 # terminal
bind = $mainMod, W, exec, terminal_on_workstation   # terminal on workstation
bind = $mainMod, G, exec, browser1
bind = $mainMod SHIFT, G, exec, browser3
bind = $mainMod, F, exec, browser2
bind = $mainMod, B, exec, bluetooth-connect
bind = $mainMod SHIFT, B, exec, pulseprofile.py
bind = $mainMod, C, exec, google-calendar
bind = $mainMod SHIFT, C, exec, google-chat
bind = $mainMod, H, exec, home
bind = $mainMod, I, exec, irc
bind = $mainMod, M, exec, google-meet
bind = $mainMod, N, exec, notepad
bind = $mainMod, R, exec, remote-desktop
bind = $mainMod, Y, exec, youtube-music
# NOTE: SUPER+D (code) and SUPER+S (secureshell) are intentionally left unbound
# -- those helper scripts aren't in this repo. Add them in
# ~/.config/hypr/hyprland.conf.local (sourced at the end of this file).
bind = $mainMod, E, exec, $terminal -e yazi         # file manager (yazi)
bind = $mainMod, Space, exec, ~/.config/hypr/scripts/launch-fuzzel.sh  # launcher
bind = $mainMod, BackSpace, killactive,             # close / kill window
bind = $mainMod, L, exec, $lock                     # lock screen (hyprlock)
bind = $mainMod SHIFT, E, exit,                     # exit Hyprland (log out)

# --- Krohnkite-equivalent master/stack controls ---
# On symbol keys, so the letters above stay free for launchers.
# Master ratio (mfact): Meta+\ grows the master area, Meta+/ shrinks it.
binde = $mainMod, backslash, layoutmsg, mfact +0.025
binde = $mainMod, slash,     layoutmsg, mfact -0.025

# Set the focused window as master.
bind = $mainMod, Return, layoutmsg, swapwithmaster master

# Add / remove windows from the master area.
bind = $mainMod, equal, layoutmsg, addmaster
bind = $mainMod, minus, layoutmsg, removemaster

# Cycle the master orientation (left/top/right/bottom/center).
bind = $mainMod, O, layoutmsg, orientationnext
bind = $mainMod SHIFT, O, layoutmsg, orientationprev

# Cycle layouts (tile -> threecolumn -> columns); monocle has its own key below.
bind = $mainMod, period, exec, ~/.config/hypr/scripts/layout-cycle.sh next
bind = $mainMod, comma,  exec, ~/.config/hypr/scripts/layout-cycle.sh prev

# Monocle: fullscreen state 1 keeps gaps and the bar visible.
bind = $mainMod, grave, fullscreen, 1

# Move focus through the stack.
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
# Move the focused window within the stack.
bind = $mainMod SHIFT, J, layoutmsg, swapnext
bind = $mainMod SHIFT, K, layoutmsg, swapprev

# Directional focus / move (arrow keys, in addition to the vim stack keys).
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Layout / window state ---
# Quick toggle between master and dwindle layouts.
bind = $mainMod SHIFT, backslash, exec, ~/.config/hypr/scripts/toggle-layout.sh
# Toggle floating for the focused window (two keys for the same action).
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, Insert, togglefloating,
# Pseudo-tile (useful with dwindle).
bind = $mainMod, P, pseudo,

# --- Resize submap (modal resize mode) ---
# Enter with SUPER+Shift+R, then use h/j/k/l or arrows to resize; Esc/Enter exits.
bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
binde = , left,  resizeactive, -40 0
binde = , right, resizeactive, 40 0
binde = , up,    resizeactive, 0 -40
binde = , down,  resizeactive, 0 40
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# --- Workspaces (virtual desktops 1-10) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move the focused window to a workspace (stays on current workspace).
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# --- Mouse: drag to move / resize ---
# SUPER + left mouse drags to move, SUPER + right mouse drags to resize.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media / brightness keys (laptop friendly) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
# Playback keys (your xbindkeysrc binds XF86AudioPlay). playerctl talks to any
# MPRIS player (browsers, music apps).
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
# Calculator key (your xbindkeysrc binds XF86Calculator). Plain `bind` (not
# bindl) so it doesn't launch a GUI app behind the lock screen.
bind = , XF86Calculator, exec, gnome-calculator

# --- Screenshots (your xbindkeysrc binds Print) ---
# Print = whole screen to the clipboard; SUPER+Print / Shift+Print = select a
# region to the clipboard. Uses grim + slurp + wl-copy (Wayland; the X
# `screenshot` script won't work here). Paste with SUPER+V or an app's paste.
bind = , Print,          exec, grim - | wl-copy --type image/png
bind = $mainMod, Print,  exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = SHIFT, Print,     exec, grim -g "$(slurp)" - | wl-copy --type image/png

# --- Laptop lid ---
# On close: disable the internal panel; the helper suspends ONLY when no
# external display is connected (so a docked laptop with the lid shut keeps
# running on the external screen). On open: re-enable the internal panel.
# For this to be the sole lid handler, setup-hypr installs a logind drop-in
# setting HandleLidSwitch=ignore (see the scripts repo / README).
bindl = , switch:on:Lid Switch,  exec, ~/.config/hypr/scripts/lid.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh open

################################################################################
# WINDOW RULES
################################################################################
# Float common transient dialogs so they don't disrupt the tiling.
# Hyprland 0.53 replaced the old `windowrule = float, class:^(x)$` form with
# match-first fields that each take a value: `match:<prop> <regex>, <effect>
# <value>`. (On Hyprland < 0.53 use e.g. `windowrule = float,
# class:^(pavucontrol)$` instead.)
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File)$, float on

################################################################################
# PER-MACHINE OVERRIDES
################################################################################
# ~/.config/hypr/hyprland.conf.local -- the same file name plus a .local
# suffix, like .shrc.local and sway's config.local. Sourced LAST so its
# settings (general/decoration/input values, monitor rules) override the
# shared defaults above; the file itself is machine-local and never
# committed. setup-hypr seeds it from hyprland.conf.local.template (see that
# file for what belongs here: pinned monitor rules, the unbound SUPER+D/S
# launchers, device tweaks). NOTE: binds do NOT override -- Hyprland runs
# every bind on a key in order, so to REBIND an already-bound key the local
# file must `unbind` it first (see the template). Unlike sway's include,
# Hyprland shows a config-error notice when a sourced file is missing -- run
# setup-hypr (or just `touch` the file) to create it.
source = ~/.config/hypr/hyprland.conf.local
