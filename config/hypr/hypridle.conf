# hypridle configuration
# ~/.config/hypr/hypridle.conf
#
# Laptop-friendly idle behaviour: dim the screen first, then lock, then turn
# the display off, then suspend. Timeouts are cumulative from the last input.

general {
    # Use hyprlock to lock; avoid stacking multiple instances.
    lock_cmd = pidof hyprlock || hyprlock
    # Lock before the system sleeps so you wake to a lock screen.
    before_sleep_cmd = loginctl lock-session
    # Fix DPMS state when resuming.
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 2.5 min: dim the backlight (save & restore the previous brightness).
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# 5 min: lock the session.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 5.5 min: turn the display off (DPMS), on again on activity.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 30 min: suspend the machine.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
