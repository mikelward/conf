# kanshi default host profiles -- intentionally empty of profiles.
#
# This file exists so the parent config's `include "hosts/*.conf"` glob
# ALWAYS matches at least one file. kanshi expands the include with
# wordexp(3); an unmatched glob would be left as the literal string
# "hosts/*.conf", which kanshi would then try (and fail) to open, exiting
# instead of running. Keeping this placeholder present avoids that.
#
# Because it declares no `profile` blocks, it contributes nothing: on a
# machine without its own hosts/<hostname>.conf, kanshi finds no matching
# profile and leaves the compositor's default output arrangement untouched
# (graceful degradation -- no hard failure).
#
# Put real per-host profiles in hosts/<hostname>.conf (copy one from
# hosts/examples/). Do NOT add profiles here -- they would apply on every
# machine.
