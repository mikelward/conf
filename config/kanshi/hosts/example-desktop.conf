# kanshi per-host profiles -- EXAMPLE DESKTOP. Illustrative placeholders;
# rename to hosts/<hostname>.conf and confirm names/modes with wlr-randr.
#
# A desktop with two monitors on DisplayPort. Plugging/unplugging the
# second monitor auto-switches dual <-> single (external enabled on
# hotplug).

# Dual monitor: primary + secondary to its right.
profile dual {
	output "DP-1" enable mode 2560x1440@144.000 position 0,0 scale 1.0
	output "DP-2" enable mode 2560x1440@60.000 position 2560,0 scale 1.0
}

# Single monitor.
profile single {
	output "DP-1" enable mode 2560x1440@144.000 position 0,0 scale 1.0
}
