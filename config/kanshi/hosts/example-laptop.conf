# kanshi per-host profiles -- EXAMPLE LAPTOP. Illustrative placeholders;
# rename to hosts/<hostname>.conf and confirm names/modes with wlr-randr.
#
# Profiles are matched by the connected output set, so plugging the
# external monitor auto-switches undocked -> docked (external enabled on
# hotplug). The lid-closed case (internal off) is handled by river-lid,
# not by a profile, because kanshi can't see the lid.

# Docked: internal on the left, external on the right.
profile docked {
	output "eDP-1"    enable mode 1920x1080 position 0,0 scale 1.0
	output "HDMI-A-1" enable mode 2560x1440 position 1920,0 scale 1.0
}

# Undocked: just the built-in panel.
profile undocked {
	output "eDP-1" enable mode 1920x1080 position 0,0 scale 1.0
}
