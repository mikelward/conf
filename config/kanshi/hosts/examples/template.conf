# kanshi per-host profiles -- TEMPLATE. Copy to hosts/<hostname>.conf and
# replace the PLACEHOLDER output names.
#
# Find output names + modes with:   wlr-randr
# It prints blocks like:
#   eDP-1 "Some Vendor 0x1234" ...     <- internal laptop panel
#     1920x1080 px, 60.000 Hz
#   HDMI-A-1 "Dell U2415 ABC123" ...   <- external
#
# You can match an output by connector name ("eDP-1") or by description
# ("Dell U2415 ABC123"); description is stable across ports, connector
# name is shorter. Use whichever you prefer -- examples below use
# connector names.
#
# kanshi applies the FIRST profile whose set of `output ... enable` lines
# matches exactly the connected outputs. Order specific profiles (more
# outputs) before general ones.

# --- Docked: internal + external, side by side --------------------------
# profile docked {
#     output "eDP-1"    enable mode 1920x1080 position 0,0 scale 1.0
#     output "HDMI-A-1" enable mode 2560x1440 position 1920,0 scale 1.0
#     # Make the external the primary bar/workspace output if you like.
# }

# --- Undocked: internal panel only --------------------------------------
# profile undocked {
#     output "eDP-1" enable mode 1920x1080 position 0,0 scale 1.0
# }

# --- External only (e.g. laptop lid shut, single external) --------------
# profile external-only {
#     output "eDP-1"    disable
#     output "HDMI-A-1" enable mode 2560x1440 position 0,0 scale 1.0
# }
